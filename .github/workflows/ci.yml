name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Registry
        run: npm run registry:build

      - name: Run Tests
        run: npm test

      - name: Build CLI
        run: npm run build --workspace=packages/cli
        continue-on-error: true

      - name: Build Storefront
        run: npm run build --workspace=apps/storefront
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder_key
          NEXT_PUBLIC_SITE_URL: https://modern-ui-vault.vercel.app

  registry-check:
    name: Registry Integrity Check
    runs-on: ubuntu-latest
    needs: lint-test-build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Registry
        run: npm run registry:build

      - name: Verify Registry Output
        run: |
          if [ ! -f "apps/storefront/public/registry/index.json" ]; then
            echo "❌ Registry index.json not found!"
            exit 1
          fi
          
          COMPONENT_COUNT=$(node -e "const r = require('./apps/storefront/public/registry/index.json'); console.log(r.stats?.totalComponents || r.components?.length || 0)")
          echo "✔ Registry contains $COMPONENT_COUNT components"
          
          if [ "$COMPONENT_COUNT" -lt 100 ]; then
            echo "⚠️ Warning: Expected 100+ components, found $COMPONENT_COUNT"
          fi
